<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Plant Care Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f7f0; }
        .plant-card { border-left: 5px solid #4CAF50; transition: box-shadow .2s; }
        .plant-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }
        .plant-card.needs-attention { border-left-color: #FF9800; }
        .sensor-badge { font-size: .75rem; }
        .stat-card { border-radius: 12px; }
        #events-list { max-height: 300px; overflow-y: auto; }
        .event-item { font-size: .85rem; border-bottom: 1px solid #eee; padding: 6px 0; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark" style="background:#2E7D32">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">Plant Care Monitor</span>
        <span class="text-white-50 small" id="last-update"></span>
    </div>
</nav>

<div class="container-fluid py-3">

    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="card stat-card text-center py-3">
                <div class="fs-2 fw-bold text-success" id="total-plants">-</div>
                <div class="text-muted small">Total Plants</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card stat-card text-center py-3">
                <div class="fs-2 fw-bold text-success" id="healthy-plants">-</div>
                <div class="text-muted small">Healthy</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card stat-card text-center py-3">
                <div class="fs-2 fw-bold text-warning" id="attention-plants">-</div>
                <div class="text-muted small">Need Attention</div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card stat-card text-center py-3">
                <div class="fs-2 fw-bold text-danger" id="pending-recs">-</div>
                <div class="text-muted small">Open Alerts</div>
            </div>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-md-8">
            <h5 class="mb-3">Plants</h5>
            <div id="plant-cards" class="row g-3"></div>
        </div>

        <div class="col-md-4">
            <h5 class="mb-3">Recent Events</h5>
            <div class="card p-3">
                <div id="events-list"><p class="text-muted small">Loading...</p></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="plantModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>
</div>
</div>
<button id="add_btn" class="btn btn-success" onclick="openAddPlant()">+ Add Plant</button>
<div class="modal fade" id="addPlantModal" tabinFdex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header" style="background:#2E7D32; color:white">
                <h5 class="modal-title">Add new plant</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">

                <div id="step-basic">
                    <h6 class="text-muted mb-3">Basic Info</h6>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Plant Name <span class="text-danger">*</span></label>
                        <input type="text" id="f-name" class="form-control" placeholder="e.g. Ficus #2">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Species <span class="text-danger">*</span></label>
                        <select id="f-species" class="form-select" onchange="onSpeciesChange()">
                            <option value="">Select species...</option>
                        </select>
                        <div class="species-hint" id="species-hint"></div>
                    </div>
                    <div class="row g-2">
                        <div class="col-6">
                            <label class="form-label fw-semibold">Height (cm)</label>
                            <input type="number" id="f-height" class="form-control" placeholder="e.g. 30" min="0" step="0.1">
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Pot Size (cm)</label>
                            <input type="number" id="f-pot" class="form-control" placeholder="e.g. 15" min="0">
                        </div>
                    </div>

                    <hr class="my-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="text-muted mb-0">Custom Thresholds <span class="badge bg-secondary" style="font-size:.7rem">optional</span></h6>
                        <button class="btn btn-sm btn-outline-secondary" onclick="toggleCustom()">
                            <span id="custom-toggle-label">Show</span>
                        </button>
                    </div>

                    <div id="custom-thresholds" class="d-none">
                        <p class="text-muted small mb-2">Leave blank to use species defaults.</p>
                        <div class="row g-2">
                            <div class="col-6">
                                <label class="form-label small">Temp Min (°C)</label>
                                <input type="number" id="f-tmin" class="form-control form-control-sm" step="0.1">
                            </div>
                            <div class="col-6">
                                <label class="form-label small">Temp Max (°C)</label>
                                <input type="number" id="f-tmax" class="form-control form-control-sm" step="0.1">
                            </div>
                            <div class="col-6">
                                <label class="form-label small">Humidity Min (%)</label>
                                <input type="number" id="f-hmin" class="form-control form-control-sm" min="0" max="100">
                            </div>
                            <div class="col-6">
                                <label class="form-label small">Humidity Max (%)</label>
                                <input type="number" id="f-hmax" class="form-control form-control-sm" min="0" max="100">
                            </div>
                            <div class="col-6">
                                <label class="form-label small">Soil Moisture Min (%)</label>
                                <input type="number" id="f-smmin" class="form-control form-control-sm" min="0" max="100">
                            </div>
                            <div class="col-12">
                                <label class="form-label small">Light Min (lux)</label>
                                <input type="number" id="f-lmin" class="form-control form-control-sm" min="0">
                            </div>
                        </div>
                    </div>
                </div>

                <div id="form-error" class="alert alert-danger mt-3 d-none"></div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-success" onclick="submitPlant()">
                    <span id="submit-spinner" class="spinner-border spinner-border-sm me-1 d-none"></span>
                    Add Plant
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const modal = new bootstrap.Modal(document.getElementById('plantModal'));
    const addModal = new bootstrap.Modal(document.getElementById('addPlantModal'));
    let speciesList = [];

    async function openAddPlant() {
        resetAddForm();
        if (speciesList.length === 0) await loadSpecies();
        addModal.show();
    }

    async function loadSpecies() {
        const res = await fetch('/api/species');
        speciesList = await res.json();
        const sel = document.getElementById('f-species');
        sel.innerHTML = '<option value="">Select species...</option>';
        speciesList.forEach(s => {
            sel.innerHTML += `<option value="${s.id}">${s.name}</option>`;
        });
    }
    function resetAddForm() {
        ['f-name','f-height','f-pot','f-tmin','f-tmax','f-hmin','f-hmax','f-smmin','f-lmin']
            .forEach(id => document.getElementById(id).value = '');
        document.getElementById('f-species').value = '';
        document.getElementById('species-hint').textContent = '';
        document.getElementById('form-error').classList.add('d-none');
        document.getElementById('custom-thresholds').classList.add('d-none');
        document.getElementById('custom-toggle-label').textContent = 'Show';
    }

    function showError(msg) {
        const el = document.getElementById('form-error');
        el.textContent = msg;
        el.classList.remove('d-none');
    }

    function setSubmitting(on) {
        document.getElementById('submit-spinner').classList.toggle('d-none', !on);
    }

    function parseFloatOrNull(id) {
        const v = document.getElementById(id).value.trim();
        return v === '' ? null : parseFloat(v);
    }

    function parseIntOrNull(id) {
        const v = document.getElementById(id).value.trim();
        return v === '' ? null : parseInt(v);
    }

    async function submitPlant() {
        const name = document.getElementById('f-name').value.trim();
        const speciesId = document.getElementById('f-species').value;
        const errorEl = document.getElementById('form-error');

        if (!name) { showError('Plant name is required.'); return; }
        if (!speciesId) { showError('Please select a species.'); return; }

        const body = {
            name,
            speciesId: parseInt(speciesId),
            heightCm: parseFloatOrNull('f-height'),
            potSizeCm: parseIntOrNull('f-pot')
        };

        const settings = {
            tempMin: parseFloatOrNull('f-tmin'),
            tempMax: parseFloatOrNull('f-tmax'),
            humMin: parseIntOrNull('f-hmin'),
            humMax: parseIntOrNull('f-hmax'),
            soilMoistureMin: parseIntOrNull('f-smmin'),
            lightMin: parseIntOrNull('f-lmin')
        };
        const hasCustom = Object.values(settings).some(v => v !== null);

        setSubmitting(true);
        errorEl.classList.add('d-none');

        try {
            const res = await fetch('/api/plants', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (!res.ok) { showError('Failed to create plant. Check server logs.'); setSubmitting(false); return; }
            const created = await res.json();

            if (hasCustom) {
                await fetch(`/api/plants/${created.id}/settings`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(settings)
                });
            }

            addModal.hide();
            await refresh();
        } catch (e) {
            showError('Network error: ' + e.message);
        }
        setSubmitting(false);
    }

    //--------------------------

    function onSpeciesChange() {
        const id = parseInt(document.getElementById('f-species').value);
        const s = speciesList.find(x => x.id === id);
        const hint = document.getElementById('species-hint');
        if (s) {
            hint.textContent = `Temp ${s.tempMin}–${s.tempMax}°C · Humidity ${s.humMin}–${s.humMax}% · Soil ≥${s.soilMoistureMin}% · Light ≥${s.lightMin} lux`;
        } else {
            hint.textContent = '';
        }
    }

    function toggleCustom() {
        const el = document.getElementById('custom-thresholds');
        const label = document.getElementById('custom-toggle-label');
        const hidden = el.classList.toggle('d-none');
        label.textContent = hidden ? 'Show' : 'Hide';
    }
    async function loadSummary() {
        const res = await fetch('/api/dashboard/summary');
        const d = await res.json();
        document.getElementById('total-plants').textContent = d.totalPlants;
        document.getElementById('healthy-plants').textContent = d.healthyPlants;
        document.getElementById('attention-plants').textContent = d.plantsNeedingAttention;
        document.getElementById('pending-recs').textContent = d.pendingRecommendations;

        const el = document.getElementById('events-list');
        if (d.recentEvents && d.recentEvents.length) {
            el.innerHTML = d.recentEvents.map(e => `
      <div class="event-item">
        <span class="badge bg-secondary sensor-badge">${e.eventType}</span>
        <span class="ms-2">${e.actionTaken || ''}</span>
        <div class="text-muted" style="font-size:.75rem">${formatTime(e.timestamp)}</div>
      </div>`).join('');
        } else {
            el.innerHTML = '<p class="text-muted small">No events yet</p>';
        }
        document.getElementById('last-update').textContent = 'Updated: ' + new Date().toLocaleTimeString();
    }

    async function loadPlants() {
        const res = await fetch('/api/plants');
        const plants = await res.json();
        const container = document.getElementById('plant-cards');
        container.innerHTML = '';

        for (const plant of plants) {
            let telemetry = null;
            try {
                const tr = await fetch(`/api/plants/${plant.id}/telemetry/latest`);
                if (tr.ok) telemetry = await tr.json();
            } catch(e) {}

            const needsAttention = plant.state === 1;
            const col = document.createElement('div');
            col.className = 'col-sm-6 col-lg-4';
            col.innerHTML = `
      <div class="card plant-card p-3 ${needsAttention ? 'needs-attention' : ''}"
           style="cursor:pointer" onclick="openPlant(${plant.id}, '${plant.name}')">
        <div class="d-flex justify-content-between align-items-start mb-2">
          <div>
            <div class="fw-bold">${plant.name}</div>
            <div class="text-muted small">${plant.species || 'Unknown'}</div>
          </div>
          <span class="badge ${needsAttention ? 'bg-warning text-dark' : 'bg-success'}">${plant.health || 'HEALTHY'}</span>
        </div>
        ${telemetry ? `
        <div class="row g-1 text-center">
          ${telemetry.temp != null ? `<div class="col-6"><div class="bg-light rounded p-1"><small class="text-muted d-block">Temp</small><strong>${telemetry.temp}°C</strong></div></div>` : ''}
          ${telemetry.humidity != null ? `<div class="col-6"><div class="bg-light rounded p-1"><small class="text-muted d-block">Humidity</small><strong>${telemetry.humidity}%</strong></div></div>` : ''}
          ${telemetry.soilMoisture != null ? `<div class="col-6"><div class="bg-light rounded p-1"><small class="text-muted d-block">Soil</small><strong>${telemetry.soilMoisture}%</strong></div></div>` : ''}
          ${telemetry.light != null ? `<div class="col-6"><div class="bg-light rounded p-1"><small class="text-muted d-block">Light</small><strong>${telemetry.light} lux</strong></div></div>` : ''}
        </div>` : '<div class="text-muted small text-center">Waiting for data...</div>'}
        <div class="mt-2 text-muted" style="font-size:.72rem">
          ${plant.heightCm ? `Height: ${plant.heightCm} cm &nbsp;|&nbsp;` : ''}
          ${plant.lastWateredAt ? 'Watered: ' + formatTime(plant.lastWateredAt) : ''}
        </div>
      </div>`;
            container.appendChild(col);
        }
    }

    async function openPlant(id, name) {
        document.getElementById('modalTitle').textContent = name;
        document.getElementById('modalBody').innerHTML = '<p>Loading...</p>';
        modal.show();

        const [recs] = await Promise.all([
            fetch(`/api/plants/${id}/recommendations`).then(r => r.json())
        ]);

        const recHtml = recs.length
            ? recs.map(r => `
        <div class="alert alert-${r.severity === 'WARNING' ? 'warning' : r.severity === 'CRITICAL' ? 'danger' : 'info'} py-2 mb-2">
          <strong>${r.type}</strong>: ${r.message}
          <div class="text-muted" style="font-size:.75rem">${formatTime(r.createdAt)}
            ${!r.resolved ? `<button class="btn btn-sm btn-outline-secondary ms-2" onclick="resolveRec(${id},${r.id})">Resolve</button>` : '<span class="ms-2 badge bg-secondary">Resolved</span>'}
          </div>
        </div>`).join('')
            : '<p class="text-muted">No recommendations</p>';

        document.getElementById('modalBody').innerHTML = `<h6>Recommendations</h6>${recHtml}`;
    }

    async function resolveRec(plantId, recId) {
        await fetch(`/api/plants/${plantId}/recommendations/${recId}/resolve`, { method: 'POST' });
        openPlant(plantId, document.getElementById('modalTitle').textContent);
    }

    function formatTime(ts) {
        if (!ts) return '';
        return new Date(ts).toLocaleString();
    }

    async function refresh() {
        await Promise.all([loadSummary(), loadPlants()]);
    }

    refresh();
    setInterval(refresh, 30000);
</script>
</body>
</html>
